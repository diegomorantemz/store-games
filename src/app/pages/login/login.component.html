<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4 class="mb-0">
            <i class="bi bi-key"></i> Iniciar Sesión
          </h4>
        </div>
        <div class="card-body">
          <form #loginForm="ngForm" (ngSubmit)="onLogin()">
            <div *ngIf="error" class="alert alert-danger">
              <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
            </div>

            <div class="mb-3">
              <label class="form-label">
                <i class="bi bi-envelope"></i> Correo electrónico
              </label>
              <input
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
                required
                email
                placeholder="juan@email.com"
                #emailInput="ngModel"
                [class.is-invalid]="emailInput.invalid && emailInput.touched"
              >
              <div class="invalid-feedback" *ngIf="emailInput.invalid && emailInput.touched">
                Ingresa un correo válido
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">
                <i class="bi bi-lock"></i> Contraseña
              </label>
              <div class="input-group">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  [(ngModel)]="password"
                  name="password"
                  required
                  placeholder="Ingresa tu contraseña"
                  #passwordInput="ngModel"
                  [class.is-invalid]="passwordInput.invalid && passwordInput.touched"
                >
                <button 
                  class="btn btn-outline-secondary" 
                  type="button"
                  (click)="togglePasswordVisibility()"
                  [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                >
                  <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                </button>
              </div>
              <div class="invalid-feedback" *ngIf="passwordInput.invalid && passwordInput.touched">
                La contraseña es requerida
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-success w-100"
              [disabled]="loginForm.invalid || loading"
            >
              <i class="bi bi-box-arrow-in-right"></i>
              {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
            </button>

            <p class="text-center mt-3">
              ¿No tienes cuenta? <a routerLink="/register">
                <i class="bi bi-person-plus"></i> Regístrate aquí
              </a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
