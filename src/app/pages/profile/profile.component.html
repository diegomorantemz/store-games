<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow">
        <div class="card-header bg-info text-white text-center">
          <h4 class="mb-0">
            <i class="bi bi-person-gear"></i> Mi Perfil
          </h4>
        </div>
        <div class="card-body">
          <!-- Mensajes -->
          <div *ngIf="error" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
          </div>
          <div *ngIf="success" class="alert alert-success">
            <i class="bi bi-check-circle-fill"></i> {{ success }}
          </div>

          <!-- Vista de perfil -->
          <div *ngIf="!editMode && user">
            <div class="text-center mb-4">
              <div class="avatar-circle bg-primary text-white">
                {{ user.name.charAt(0).toUpperCase() }}
              </div>
              <h4 class="mt-2">{{ user.name }}</h4>
              <span class="badge bg-success">
                <i class="bi bi-check-circle"></i> Verificado
              </span>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="text-muted small">
                  <i class="bi bi-envelope"></i> Correo
                </label>
                <p class="fw-bold">{{ user.email }}</p>
              </div>
              <div class="col-md-6 mb-3">
                <label class="text-muted small">
                  <i class="bi bi-phone"></i> Teléfono
                </label>
                <p class="fw-bold">{{ user.phone }}</p>
              </div>
              <div class="col-12 mb-3">
                <label class="text-muted small">
                  <i class="bi bi-calendar3"></i> Registrado
                </label>
                <p class="fw-bold">{{ user.registeredAt | date:'dd/MM/yyyy HH:mm' }}</p>
              </div>
            </div>

            <div class="d-flex gap-2 mt-3">
              <button class="btn btn-primary flex-grow-1" (click)="toggleEdit()">
                <i class="bi bi-pencil"></i> Editar perfil
              </button>
              <button class="btn btn-danger" (click)="logout()">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
              </button>
            </div>
          </div>

          <!-- Edición de perfil -->
          <form *ngIf="editMode && user" (ngSubmit)="onUpdate()">
            <div class="mb-3">
              <label class="form-label">
                <i class="bi bi-person"></i> Nombre completo
              </label>
              <input
                type="text"
                class="form-control"
                [(ngModel)]="userData.name"
                name="name"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label">
                <i class="bi bi-phone"></i> Número de teléfono
              </label>
              <input
                type="tel"
                class="form-control"
                [(ngModel)]="userData.phone"
                name="phone"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label">
                <i class="bi bi-envelope"></i> Correo electrónico
              </label>
              <input
                type="email"
                class="form-control"
                [(ngModel)]="userData.email"
                name="email"
                required
                email
              >
            </div>

            <hr>
            <p class="text-muted small">Deja en blanco si no quieres cambiar la contraseña</p>

            <div class="mb-3">
              <label class="form-label">
                <i class="bi bi-lock"></i> Nueva contraseña
              </label>
              <div class="input-group">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  [(ngModel)]="userData.password"
                  name="password"
                  minlength="6"
                  placeholder="Mínimo 6 caracteres"
                >
                <button 
                  class="btn btn-outline-secondary" 
                  type="button"
                  (click)="togglePasswordVisibility()"
                  [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                >
                  <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                </button>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">
                <i class="bi bi-check-circle"></i> Confirmar nueva contraseña
              </label>
              <div class="input-group">
                <input
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  class="form-control"
                  [(ngModel)]="userData.confirmPassword"
                  name="confirmPassword"
                  placeholder="Repite tu nueva contraseña"
                >
                <button 
                  class="btn btn-outline-secondary" 
                  type="button"
                  (click)="toggleConfirmPasswordVisibility()"
                  [attr.aria-label]="showConfirmPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                >
                  <i class="bi" [class.bi-eye]="!showConfirmPassword" [class.bi-eye-slash]="showConfirmPassword"></i>
                </button>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button
                type="submit"
                class="btn btn-success flex-grow-1"
                [disabled]="loading"
              >
                <i class="bi bi-save"></i>
                {{ loading ? 'Guardando...' : 'Guardar cambios' }}
              </button>
              <button
                type="button"
                class="btn btn-secondary"
                (click)="toggleEdit()"
              >
                <i class="bi bi-x-lg"></i> Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
