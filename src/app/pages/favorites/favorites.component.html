<div class="container mt-4">
  <div class="card">
    <div class="card-header bg-danger text-white">
      <h4 class="mb-0">❤️ Mis Juegos Favoritos</h4>
    </div>
    <div class="card-body">
      <!-- Sin favoritos -->
      <div *ngIf="favorites.length === 0" class="text-center py-5">
        <i class="bi bi-heart" style="font-size: 4rem;"></i>
        <h5 class="mt-3">No tienes juegos favoritos</h5>
        <p>Explora el catálogo y haz clic en ❤️ para agregar tus juegos favoritos</p>
        <a routerLink="/" class="btn btn-primary">Ver juegos</a>
      </div>

      <!-- Lista de favoritos -->
      <div *ngIf="favorites.length > 0" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div *ngFor="let game of favorites" class="col">
          <div class="card h-100">
            <img 
              [src]="game.imageUrl" 
              class="card-img-top" 
              [alt]="game.name"
              style="height: 200px; object-fit: cover;"
            >
            <div class="card-body">
              <span class="badge bg-secondary mb-2">{{ game.category }}</span>
              <h5 class="card-title">{{ game.name }}</h5>
              <p class="card-text">{{ game.description | slice:0:60 }}...</p>
              
              <div class="mt-3">
                <span class="fw-bold text-success">{{ formatPrice(getGamePrice(game)) }}</span>
                <span *ngIf="game.discount > 0" class="badge bg-danger ms-2">-{{ game.discount }}%</span>
              </div>
            </div>
            <div class="card-footer bg-transparent">
              <button class="btn btn-danger w-100 mb-2" (click)="removeFromFavorites(game.id)">
                ❌ Quitar de favoritos
              </button>
              <button class="btn btn-primary w-100" #btn (click)="addToCart(game, btn)">
                🛒 Añadir al carrito
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
