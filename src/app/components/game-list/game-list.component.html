<div class="container mt-4">
  <!-- Cargando -->
  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p>Cargando juegos...</p>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <!-- Grid de juegos -->
  <div *ngIf="!loading && !error" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div *ngFor="let game of games" class="col">
      <div class="card h-100">
        <img 
          [src]="game.imageUrl" 
          class="card-img-top" 
          [alt]="game.name"
          style="height: 250px; object-fit: cover;"
        >
        <div class="card-body">
          <span class="badge bg-secondary mb-2">{{ game.category }}</span>
          <h5 class="card-title">{{ game.name }}</h5>
          <p class="card-text">{{ game.description | slice:0:80 }}...</p>
          
          <div class="mt-3">
            <ng-container *ngIf="game.discount > 0; else noDiscount">
              <span class="text-decoration-line-through text-danger me-2">
                {{ formatPrice(game.price) }}
              </span>
              <span class="fw-bold text-success">
                {{ formatPrice(getDiscountedPrice(game)) }}
              </span>
              <span class="badge bg-danger ms-2">-{{ game.discount }}%</span>
            </ng-container>
            <ng-template #noDiscount>
              <span class="fw-bold text-success">{{ formatPrice(game.price) }}</span>
            </ng-template>
          </div>
        </div>
        <div class="card-footer bg-transparent">
          <!-- Pasar el botón como parámetro -->
          <button class="btn btn-primary w-100 mb-2" #btn (click)="addToCart(game, btn)">
            🛒 Añadir al carrito
          </button>
          <button class="btn btn-outline-danger w-100" (click)="addToFavorites(game)">
            ❤️ Favoritos
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
