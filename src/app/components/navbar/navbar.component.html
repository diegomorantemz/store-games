<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <!-- Logo -->
    <a class="navbar-brand fw-bold" routerLink="/" (click)="closeMenu()">
      <i class="bi bi-controller"></i> StoreGames
    </a>

    <!-- Botón hamburguesa -->
    <button 
      class="navbar-toggler" 
      type="button" 
      data-bs-toggle="collapse" 
      data-bs-target="#navbarNav" 
      aria-controls="navbarNav" 
      aria-expanded="false" 
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-2">

        <ng-container *ngIf="user">
          <li class="nav-item">
            <span class="nav-link text-white-50">
              <i class="bi bi-person-circle"></i> Hola, <strong class="text-white">{{ user.name }}</strong>
            </span>
          </li>
          <li class="nav-item">
            <a routerLink="/profile" class="btn btn-outline-light btn-sm" (click)="closeMenu()">
              <i class="bi bi-person-gear"></i> Perfil
            </a>
          </li>
          <li class="nav-item">
            <button class="btn btn-outline-danger btn-sm" (click)="logout(); closeMenu();">
              <i class="bi bi-box-arrow-right"></i> Salir
            </button>
          </li>
        </ng-container>

        <ng-container *ngIf="!user">
          <li class="nav-item">
            <a routerLink="/login" class="btn btn-outline-light btn-sm" (click)="closeMenu()">
              <i class="bi bi-key"></i> Login
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/register" class="btn btn-outline-light btn-sm" (click)="closeMenu()">
              <i class="bi bi-person-plus"></i> Registro
            </a>
          </li>
        </ng-container>

        <li class="nav-item">
          <a routerLink="/favorites" class="btn btn-outline-light btn-sm" (click)="closeMenu()">
            <i class="bi bi-heart"></i> Favoritos
          </a>
        </li>

        <li class="nav-item">
          <a routerLink="/cart" class="btn btn-outline-light btn-sm position-relative" (click)="closeMenu()">
            <i class="bi bi-cart3"></i> Carrito
            <span *ngIf="itemCount > 0" class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle">
              {{ itemCount }}
            </span>
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>
