<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">

    <a class="navbar-brand fw-bold" routerLink="/" (click)="closeMenu()">
      <i class="bi bi-controller"></i> StoreGames
    </a>

    <button 
      class="navbar-toggler" 
      type="button" 
      data-bs-toggle="collapse" 
      data-bs-target="#navbarNav" 
      aria-controls="navbarNav" 
      aria-expanded="false" 
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-2">

        <ng-container *ngIf="user">
          <li class="nav-item">
            <span class="nav-link text-white-50">
              <i class="bi bi-person-circle"></i> Hola, <strong class="text-white">{{ user.name }}</strong>
            </span>
          </li>
        </ng-container>

        <li class="nav-item dropdown account-menu">
          <button
            class="btn btn-outline-light btn-sm account-toggle"
            type="button"
            [attr.aria-expanded]="isAccountMenuOpen"
            aria-label="Abrir menú de configuración"
            (click)="toggleAccountMenu($event)"
          >
            <i class="bi bi-person-circle account-icon"></i>
            <span *ngIf="itemCount > 0" class="badge bg-danger rounded-pill account-count">{{ itemCount }}</span>
          </button>

          <div
            class="dropdown-menu dropdown-menu-end account-dropdown shadow"
            [class.show]="isAccountMenuOpen"
            (click)="$event.stopPropagation()"
          >
            <div class="dropdown-header account-header" *ngIf="user">
              <span class="account-avatar account-avatar-lg">
                {{ user.name.charAt(0).toUpperCase() }}
              </span>
              <span>
                <strong>{{ user.name }}</strong>
                <small>{{ user.email }}</small>
              </span>
            </div>

            <div class="dropdown-header account-header" *ngIf="!user">
              <span class="account-avatar account-avatar-lg">S</span>
              <span>
                <strong>StoreGames</strong>
                <small>Gestiona tu cuenta y compras</small>
              </span>
            </div>

            <div class="dropdown-divider"></div>

            <a
              *ngIf="user"
              routerLink="/profile"
              routerLinkActive="active"
              class="dropdown-item"
              (click)="closeMenu()"
            >
              <i class="bi bi-person-gear"></i>
              <span>Perfil</span>
            </a>

            <a
              routerLink="/favorites"
              routerLinkActive="active"
              class="dropdown-item"
              (click)="closeMenu()"
            >
              <i class="bi bi-heart"></i>
              <span>Favoritos</span>
            </a>

            <a
              routerLink="/cart"
              routerLinkActive="active"
              class="dropdown-item"
              (click)="closeMenu()"
            >
              <i class="bi bi-cart3"></i>
              <span>Carrito</span>
              <span *ngIf="itemCount > 0" class="badge bg-danger rounded-pill ms-auto">{{ itemCount }}</span>
            </a>

            <a
              routerLink="/checkout"
              routerLinkActive="active"
              class="dropdown-item"
              (click)="closeMenu()"
            >
              <i class="bi bi-credit-card"></i>
              <span>Pago</span>
            </a>

            <a
              *ngIf="user"
              routerLink="/orders"
              routerLinkActive="active"
              class="dropdown-item"
              (click)="closeMenu()"
            >
              <i class="bi bi-receipt"></i>
              <span>Mis Pedidos</span>
            </a>

            <div class="dropdown-divider"></div>

            <ng-container *ngIf="!user">
              <a routerLink="/login" routerLinkActive="active" class="dropdown-item" (click)="closeMenu()">
                <i class="bi bi-key"></i>
                <span>Login</span>
              </a>
              <a routerLink="/register" routerLinkActive="active" class="dropdown-item" (click)="closeMenu()">
                <i class="bi bi-person-plus"></i>
                <span>Registro</span>
              </a>
            </ng-container>

            <button *ngIf="user" class="dropdown-item text-danger" type="button" (click)="logout(); closeMenu();">
              <i class="bi bi-box-arrow-right"></i>
              <span>Cerrar sesión</span>
            </button>
          </div>
        </li>

      </ul>
    </div>
  </div>
</nav>
